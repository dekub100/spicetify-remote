<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Music Widget</title>
    <link rel="stylesheet" href="obs-style.css">
</head>
<body>
    <div class="widget-container">
        <img id="albumArt" src="" alt="Album Art" class="album-art">
        
        <div class="info-container">
            <div class="text-info">
                <div id="songTitle" class="song-title">
                    <span class="marquee-wrapper">No song playing</span>
                </div>
                <div id="artistName" class="artist-name">
                    <span class="marquee-wrapper"></span>
                </div>
                <div id="albumName" class="album-name">
                    <span class="marquee-wrapper"></span>
                </div>
            </div>

            <div class="progress-section">
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progressBarFill" class="progress-bar-fill"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="obs-script.js"></script>
</body>
</html>
