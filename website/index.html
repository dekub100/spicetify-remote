<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spicetify Remote</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="connectionError" class="connection-error hidden">
        Could not connect to server. Retrying...
    </div>

    <div class="container" id="mainContainer">
        <div class="now-playing">
            <img id="albumArt" src="" alt="Album Art">
            <div class="song-info">
                <div id="songTitle" class="song-title">
                    <span class="marquee-wrapper">No song playing</span>
                </div>
                <div id="artistName" class="artist-name">
                    <span class="marquee-wrapper"></span>
                </div>
            </div>
        </div>

        <div class="track-progress-container">
            <span id="currentTime">0:00</span>
            <input type="range" id="progressBar" value="0" min="0" step="1">
            <span id="durationTime">0:00</span>
        </div>

        <div class="playback-controls">
            <button id="shuffleBtn" class="control-btn"><i class="fas fa-random"></i></button>
            <button id="previousBtn" class="control-btn"><i class="fas fa-step-backward"></i></button>
            <button id="playPauseBtn" class="control-btn main-control">
                <i class="fas fa-play"></i>
                <i class="fas fa-pause" style="display:none"></i>
            </button>
            <button id="nextBtn" class="control-btn"><i class="fas fa-step-forward"></i></button>
            <button id="repeatBtn" class="control-btn">
                <i class="fas fa-repeat"></i>
                <span class="repeat-badge">1</span>
            </button>
        </div>

        <div class="extra-controls">
            <button id="likeBtn" class="control-btn"><i class="fas fa-heart"></i></button>
            <div class="volume-control">
                <i class="fas fa-volume-up volume-icon"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01">
                <span id="volumeValue">50%</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
